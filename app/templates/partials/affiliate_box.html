{# Amazon + Rakuten Ichiba search CTA (guides with slug map only) #}
{% if show_affiliate %}
<aside class="affiliate-box" role="complementary" aria-label="{{ '제휴 쇼핑 링크' if current_lang == 'kr' else 'Affiliate shopping links' }}">
    <p class="affiliate-box__title">{{ affiliate_title }}</p>
    <p class="affiliate-box__desc">{{ affiliate_desc }}</p>
    <div class="affiliate-box__actions">
        <a class="affiliate-box__btn affiliate-box__btn--amazon"
           href="{{ amazon_search_url }}"
           target="_blank"
           rel="nofollow sponsored noopener noreferrer"
           title="{{ 'Amazon에서 열기 (새 탭)' if current_lang == 'kr' else 'Opens Amazon in a new tab' }}">
            {{ amazon_button_label }}
        </a>
        <a class="affiliate-box__btn affiliate-box__btn--rakuten"
           href="{{ rakuten_search_url }}"
           target="_blank"
           rel="nofollow sponsored noopener noreferrer"
           title="{{ '라쿠텐에서 열기 (새 탭)' if current_lang == 'kr' else 'Opens Rakuten in a new tab' }}">
            {{ rakuten_button_label }}
        </a>
    </div>
    <p class="affiliate-box__note">{{ affiliate_note }}</p>
</aside>
{% endif %}
